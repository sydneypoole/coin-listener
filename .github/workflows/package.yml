name: Package

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-dist:
    name: Build frontend dist zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print frontend diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Runner context"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "github_ref=${GITHUB_REF}"
          echo "github_sha=${GITHUB_SHA}"
          uname -a
          df -h
          echo "::endgroup::"

          echo "::group::Node and npm context"
          node --version
          npm --version
          echo "npm_registry=$(npm config get registry)"
          echo "::endgroup::"

          echo "::group::Frontend lockfile context"
          sha256sum frontend/package-lock.json
          if grep -n "registry.npmmirror.com" frontend/package-lock.json; then
            echo "Unexpected npmmirror registry URLs in frontend/package-lock.json" >&2
            exit 1
          fi
          echo "No npmmirror registry URLs found"
          echo "::endgroup::"

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::npm registry reachability"
          npm ping --registry=https://registry.npmjs.org/ || true
          echo "::endgroup::"
          npm ci --prefix frontend --loglevel=verbose

      - name: Build frontend
        shell: bash
        run: |
          set -euo pipefail
          npm run build --prefix frontend
          echo "::group::Frontend dist files"
          ls -lah frontend/dist
          ls -lah frontend/dist/assets
          echo "::endgroup::"

      - name: Verify frontend lockfile is unchanged
        run: git diff --exit-code -- frontend/package.json frontend/package-lock.json

      - name: Package frontend dist
        shell: bash
        run: |
          cd frontend/dist
          zip -r "${GITHUB_WORKSPACE}/coin-listener-frontend-dist-${GITHUB_SHA}.zip" .

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: coin-listener-frontend-dist
          path: coin-listener-frontend-dist-${{ github.sha }}.zip
          if-no-files-found: error

  backend-executable:
    name: Build backend executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Print backend diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Runner context"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "github_ref=${GITHUB_REF}"
          echo "github_sha=${GITHUB_SHA}"
          uname -a
          df -h
          echo "::endgroup::"

          echo "::group::Rust context"
          rustc --version
          cargo --version
          rustup show
          sha256sum backend/Cargo.lock
          echo "::endgroup::"

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build all-in-one backend executable
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --manifest-path backend/Cargo.toml --bin all-in-one --verbose

      - name: Verify backend executable exists
        shell: bash
        run: |
          set -euo pipefail
          test -x backend/target/release/all-in-one
          ls -lah backend/target/release/all-in-one
          file backend/target/release/all-in-one

      - name: Package backend executable
        shell: bash
        run: |
          set -euo pipefail
          archive="coin-listener-all-in-one-linux-amd64-${GITHUB_SHA}.tar.gz"
          tar -czf "${archive}" -C backend/target/release all-in-one
          ls -lah "${archive}"

      - name: Upload backend executable artifact
        uses: actions/upload-artifact@v6
        with:
          name: coin-listener-all-in-one-linux-amd64
          path: coin-listener-all-in-one-linux-amd64-${{ github.sha }}.tar.gz
          if-no-files-found: error

  docker-image:
    name: Build all-in-one Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}-all-in-one"
          short_sha="${GITHUB_SHA::12}"
          archive="coin-listener-all-in-one-docker-${GITHUB_SHA}.tar.gz"

          {
            echo "image=${image}"
            echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
            echo "short_sha=${short_sha}"
            echo "archive=${archive}"
          } >> "${GITHUB_OUTPUT}"

          echo "::group::Docker metadata"
          echo "image=${image}"
          echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
          echo "short_sha=${short_sha}"
          echo "archive=${archive}"
          echo "::endgroup::"

      - name: Print Docker diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Runner context"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "github_ref=${GITHUB_REF}"
          echo "github_sha=${GITHUB_SHA}"
          uname -a
          df -h
          echo "::endgroup::"

          echo "::group::Docker context"
          docker version
          docker info
          docker buildx version || true
          echo "::endgroup::"

      - name: Build all-in-one Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build --progress=plain \
            -f docker/all-in-one.Dockerfile \
            -t "${{ steps.docker-meta.outputs.local_tag }}" \
            .
          docker image inspect "${{ steps.docker-meta.outputs.local_tag }}" --format 'image_id={{.Id}} size={{.Size}}'

      - name: Export Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.docker-meta.outputs.local_tag }}" | gzip -c > "${{ steps.docker-meta.outputs.archive }}"
          test -s "${{ steps.docker-meta.outputs.archive }}"
          ls -lah "${{ steps.docker-meta.outputs.archive }}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v6
        with:
          name: coin-listener-all-in-one-docker-image
          path: ${{ steps.docker-meta.outputs.archive }}
          if-no-files-found: error

  docker-push:
    name: Push all-in-one Docker image
    if: github.event_name == 'push'
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: coin-listener-all-in-one-docker-image

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}-all-in-one"
          short_sha="${GITHUB_SHA::12}"
          archive="coin-listener-all-in-one-docker-${GITHUB_SHA}.tar.gz"

          {
            echo "image=${image}"
            echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
            echo "short_sha=${short_sha}"
            echo "archive=${archive}"
          } >> "${GITHUB_OUTPUT}"

          echo "::group::Docker push metadata"
          echo "image=${image}"
          echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
          echo "short_sha=${short_sha}"
          echo "archive=${archive}"
          echo "::endgroup::"

      - name: Print Docker push diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Runner context"
          echo "runner_os=${RUNNER_OS}"
          echo "runner_arch=${RUNNER_ARCH}"
          echo "github_ref=${GITHUB_REF}"
          echo "github_ref_type=${GITHUB_REF_TYPE}"
          echo "github_ref_name=${GITHUB_REF_NAME}"
          echo "github_sha=${GITHUB_SHA}"
          uname -a
          df -h
          echo "::endgroup::"

          echo "::group::Docker context"
          docker version
          docker info
          ls -lah
          echo "::endgroup::"

      - name: Load Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          ls -lah "${{ steps.docker-meta.outputs.archive }}"
          gzip -dc "${{ steps.docker-meta.outputs.archive }}" | docker load
          docker image inspect "${{ steps.docker-meta.outputs.local_tag }}" --format 'image_id={{.Id}} size={{.Size}}'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GitHub Container Registry
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.docker-meta.outputs.image }}"
          local_tag="${{ steps.docker-meta.outputs.local_tag }}"
          short_sha="${{ steps.docker-meta.outputs.short_sha }}"
          tags=("${image}:sha-${short_sha}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            ref_tag="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
            if [[ -n "${ref_tag}" ]]; then
              tags+=("${image}:${ref_tag}")
            fi
            if [[ "${GITHUB_REF_NAME}" == "${GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH:-}" ]]; then
              tags+=("${image}:latest")
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ref_tag="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
            if [[ -n "${ref_tag}" ]]; then
              tags+=("${image}:${ref_tag}")
            fi
          fi

          echo "::group::Docker tags"
          printf '%s\n' "${tags[@]}"
          echo "::endgroup::"

          for tag in "${tags[@]}"; do
            echo "Pushing ${tag}"
            docker tag "${local_tag}" "${tag}"
            docker push "${tag}"
          done
        env:
          GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

