name: Package

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-dist:
    name: Build frontend dist zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Verify frontend lockfile is unchanged
        run: git diff --exit-code -- frontend/package.json frontend/package-lock.json

      - name: Package frontend dist
        shell: bash
        run: |
          cd frontend/dist
          zip -r "${GITHUB_WORKSPACE}/coin-listener-frontend-dist-${GITHUB_SHA}.zip" .

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: coin-listener-frontend-dist
          path: coin-listener-frontend-dist-${{ github.sha }}.zip
          if-no-files-found: error

  backend-executable:
    name: Build backend executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Build all-in-one backend executable
        run: cargo build --locked --release --manifest-path backend/Cargo.toml --bin all-in-one

      - name: Verify backend executable exists
        run: test -x backend/target/release/all-in-one

      - name: Package backend executable
        run: tar -czf "coin-listener-all-in-one-linux-amd64-${GITHUB_SHA}.tar.gz" -C backend/target/release all-in-one

      - name: Upload backend executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: coin-listener-all-in-one-linux-amd64
          path: coin-listener-all-in-one-linux-amd64-${{ github.sha }}.tar.gz
          if-no-files-found: error

  docker-image:
    name: Build all-in-one Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}-all-in-one"
          short_sha="${GITHUB_SHA::12}"
          archive="coin-listener-all-in-one-docker-${GITHUB_SHA}.tar.gz"

          {
            echo "image=${image}"
            echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
            echo "short_sha=${short_sha}"
            echo "archive=${archive}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build all-in-one Docker image
        run: |
          docker build \
            -f docker/all-in-one.Dockerfile \
            -t "${{ steps.docker-meta.outputs.local_tag }}" \
            .

      - name: Export Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.docker-meta.outputs.local_tag }}" | gzip -c > "${{ steps.docker-meta.outputs.archive }}"
          test -s "${{ steps.docker-meta.outputs.archive }}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: coin-listener-all-in-one-docker-image
          path: ${{ steps.docker-meta.outputs.archive }}
          if-no-files-found: error

  docker-push:
    name: Push all-in-one Docker image
    if: github.event_name == 'push'
    needs: docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: coin-listener-all-in-one-docker-image

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}-all-in-one"
          short_sha="${GITHUB_SHA::12}"
          archive="coin-listener-all-in-one-docker-${GITHUB_SHA}.tar.gz"

          {
            echo "image=${image}"
            echo "local_tag=coin-listener-all-in-one:${GITHUB_SHA}"
            echo "short_sha=${short_sha}"
            echo "archive=${archive}"
          } >> "${GITHUB_OUTPUT}"

      - name: Load Docker image artifact
        shell: bash
        run: |
          set -euo pipefail
          gzip -dc "${{ steps.docker-meta.outputs.archive }}" | docker load

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GitHub Container Registry
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.docker-meta.outputs.image }}"
          local_tag="${{ steps.docker-meta.outputs.local_tag }}"
          short_sha="${{ steps.docker-meta.outputs.short_sha }}"
          tags=("${image}:sha-${short_sha}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
            ref_tag="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
            if [[ -n "${ref_tag}" ]]; then
              tags+=("${image}:${ref_tag}")
            fi
            if [[ "${GITHUB_REF_NAME}" == "${GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH:-}" ]]; then
              tags+=("${image}:latest")
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ref_tag="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+|-+$//g')"
            if [[ -n "${ref_tag}" ]]; then
              tags+=("${image}:${ref_tag}")
            fi
          fi

          for tag in "${tags[@]}"; do
            docker tag "${local_tag}" "${tag}"
            docker push "${tag}"
          done
        env:
          GITHUB_EVENT_REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

