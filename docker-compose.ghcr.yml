services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coin_listener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coin_listener_password}
      POSTGRES_DB: ${POSTGRES_DB:-coin_listener}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coin_listener} -d ${POSTGRES_DB:-coin_listener}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  all-in-one:
    image: ${COIN_LISTENER_IMAGE:-ghcr.io/owner/repo-all-in-one:latest}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://coin_listener:coin_listener_password@postgres:5432/coin_listener}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      API_SERVER_PORT: ${API_SERVER_PORT:-8080}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
      RUST_LOG: ${RUST_LOG:-info}
      NOTIFY_QUEUE_KEY: ${NOTIFY_QUEUE_KEY:-notify:event:queue}
      SCAN_QUEUE_KEY: ${SCAN_QUEUE_KEY:-scan:address:queue}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
