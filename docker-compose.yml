services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coin_listener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coin_listener_password}
      POSTGRES_DB: ${POSTGRES_DB:-coin_listener}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coin_listener} -d ${POSTGRES_DB:-coin_listener}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-server:
    profiles:
      - multi-process
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: ["api-server"]
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    profiles:
      - multi-process
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: ["scheduler"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles:
      - multi-process
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: ["worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notifier:
    profiles:
      - multi-process
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: ["notifier"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  all-in-one:
    profiles:
      - all-in-one
    build:
      context: .
      dockerfile: docker/all-in-one.Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
